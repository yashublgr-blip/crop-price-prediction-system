<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Crop Price AI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#edf7ed,#c8e6c9,#81c784);
        }
        .card{
            width:400px;
            background:#fff;
            padding:35px;
            border-radius:24px;
            box-shadow:0 18px 40px rgba(0,0,0,0.18);
        }
        h2{text-align:center;color:#2e7d32;margin-bottom:12px}
        p{text-align:center;color:#666;margin-bottom:22px}
        label{display:block;margin:12px 0 6px;font-weight:600}
        input{
            width:100%;
            padding:12px;
            border-radius:12px;
            border:1px solid #ccc;
            outline:none;
        }
        input:focus{
            border-color:#2e7d32;
            box-shadow:0 0 0 3px rgba(46,125,50,0.15);
        }
        button{
            width:100%;
            margin-top:18px;
            padding:13px;
            background:linear-gradient(135deg,#2e7d32,#43a047);
            color:#fff;
            border:none;
            border-radius:12px;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
        }
        .error{margin-top:12px;text-align:center;color:#d32f2f;font-weight:600}
        .link{text-align:center;margin-top:18px}
        .link a{text-decoration:none;color:#2e7d32;font-weight:700}
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Account</h2>
        <p>Register for Crop Price AI</p>

        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Signup</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="link">
            <a href="/login">Already have an account? Login</a>
        </div>
    </div>
</body>
</html>
